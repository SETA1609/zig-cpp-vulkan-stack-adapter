name: build

# Runs on every push to main and on every PR targeting main. The `Test` step
# is the merge gate: enable it as a required status check in the repo's branch
# protection for `main` so a PR cannot merge until it is green.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig version
        run: zig version

      # Formatting gate (run before build so no generated dirs are scanned).
      - name: Format check
        run: zig fmt --check build.zig build.zig.zon src demo

      # Build the static library (generates vk bindings from vk.xml).
      - name: Build
        run: zig build

      # Smoke demo — builds + runs a consumer of the module (see demo/main.zig).
      - name: Run
        run: zig build run

      # Unit tests — the merge gate. Data/contract tests run (incl. the real
      # `vk` re-export); bridge behavioral tests skip until implemented
      # (see src/tests/api_test.zig).
      - name: Test
        run: zig build test
