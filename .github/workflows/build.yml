name: CI

# Runs on every push (any branch) and every PR. The `build` job is the merge
# gate: make it a required status check in branch protection for `main`. The
# checks live in scripts/ci.sh (single source of truth, runnable locally) — the
# jobs here just install the toolchain / clang-format-18 / Vulkan ICD.
on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: these workflows only check out + build; no writes needed.
permissions:
  contents: read

defaults:
  run:
    shell: bash # so scripts/ci.sh runs on the Windows runner too

jobs:
  # Lint the workflow YAML itself for safety (structure, action pinning,
  # injection, least-privilege) using the vendored validator under
  # .claude/skills/check-workflows — also a Claude Code skill.
  lint-workflows:
    name: lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PyYAML
        run: python3 -c "import yaml" 2>/dev/null || python3 -m pip install --break-system-packages --quiet pyyaml
      - name: Validate workflow YAML (--strict)
        run: python3 .claude/skills/check-workflows/validate_workflows.py --strict

  build:
    name: build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
      - run: zig version
      # fmt + build (vk bindings + VMA C++ bridge) + smoke demo + contract test.
      - name: CI checks
        run: bash scripts/ci.sh check

  # The only C++↔Zig boundary in the lib (the VMA bridge). Google style; the
  # .clang-format `Standard: Latest` needs clang-format-18.
  clang-format:
    name: clang-format (src/c)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format-18
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check src/c
        run: CLANG_FORMAT=clang-format-18 bash scripts/ci.sh clang-format

  # Proves the opt-in shaderc wiring compiles: fetches the lazy tiawl/shaderc.zig
  # dep and builds shaderc + glslang + SPIRV-Tools from source (slow cold; cached).
  shaderc:
    name: shaderc build (-Dshaderc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
      - run: bash scripts/ci.sh shaderc

  # The device-dependent test-tdd suite (volk + VMA) needs a real Vulkan device,
  # which GitHub runners don't have. It's verified locally (real GPU) or in the
  # dev container — `bash scripts/ci.sh device-tests`. A software ICD (lavapipe)
  # is too runner-image-fragile (it must advertise the 1.3 the harness requests),
  # so it's deliberately not a CI job.
