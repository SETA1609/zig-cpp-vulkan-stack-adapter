name: CI

# Runs on every push (any branch) and every PR. The `build` job is the merge
# gate: make it a required status check in branch protection for `main`. The
# checks live in scripts/ci.sh (single source of truth, runnable locally) — the
# jobs here just install the toolchain / clang-format-18 / Vulkan ICD.
on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: these workflows only check out + build; no writes needed.
permissions:
  contents: read

defaults:
  run:
    shell: bash # so scripts/ci.sh runs on the Windows runner too

jobs:
  build:
    name: build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
      - run: zig version
      # fmt + build (vk bindings + VMA C++ bridge) + smoke demo + contract test.
      - name: CI checks
        run: bash scripts/ci.sh check

  # The only C++↔Zig boundary in the lib (the VMA bridge). Google style; the
  # .clang-format `Standard: Latest` needs clang-format-18.
  clang-format:
    name: clang-format (src/c)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format-18
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check src/c
        run: CLANG_FORMAT=clang-format-18 bash scripts/ci.sh clang-format

  # Proves the opt-in shaderc wiring compiles: fetches the lazy tiawl/shaderc.zig
  # dep and builds shaderc + glslang + SPIRV-Tools from source (slow cold; cached).
  shaderc:
    name: shaderc build (-Dshaderc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
      - run: bash scripts/ci.sh shaderc

  # Runs the device-dependent test-tdd suite (volk + VMA) and, via -Dshaderc, the
  # shaderc sessions, against Mesa's lavapipe **software** Vulkan ICD — no GPU,
  # and headless (the harness makes no window/surface). Best-effort: lavapipe's
  # advertised Vulkan version varies by runner image and the harness requests 1.3;
  # promote to a required check once proven stable.
  device-tests:
    name: device tests (lavapipe)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
    steps:
      - uses: actions/checkout@v4
      - name: Install lavapipe (software Vulkan) + loader
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
      - name: Vulkan sanity (is lavapipe visible?)
        run: vulkaninfo --summary || true
      - name: test-tdd against lavapipe (+ shaderc)
        run: bash scripts/ci.sh device-tests
